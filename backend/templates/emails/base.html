<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; margin: 0; padding: 0; background-color: #f8fafc; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { background-color: #1e3a5f; color: white; padding: 30px 20px; text-align: center; }
        .brand { font-size: 24px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .brand-accent { color: #0d9488; }
        .content { padding: 30px 40px; line-height: 1.6; }
        .footer { background-color: #f1f5f9; color: #64748b; text-align: center; padding: 20px; font-size: 12px; border-top: 1px solid #e2e8f0; }
        .btn { display: inline-block; background-color: #0d9488; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 15px; }
        h2 { color: #1e3a5f; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">TalentFlow<span class="brand-accent">-AI</span></div>
            <div>Next-Generation Recruitment</div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 TalentFlow-AI Platform. All rights reserved.</p>
            <p>This is an automated message, please do not reply directly to this email.</p>
        </div>
    </div>
</body>
</html>
