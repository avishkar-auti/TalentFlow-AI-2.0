services:
  # 1. Backend FastAPI Web Service
  - type: web
    name: talentflow-backend
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:create_app --factory --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production

  # 2. Recruiter Dashboard Frontend
  - type: web
    name: talentflow-recruiter-dashboard
    env: static
    region: singapore
    rootDir: frontend/recruiter-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://talentflow-backend.onrender.com/api/v1

  # 3. Candidate Portal Frontend
  - type: web
    name: talentflow-candidate-portal
    env: static
    region: singapore
    rootDir: frontend/candidate-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://talentflow-backend.onrender.com/api/v1
